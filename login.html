<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - StanderdUnion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div class="login-box">
        <div class="brand">StanderdUnion</div>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkLogin()">Sign In</button>
    </div>
    <script>
        function checkLogin() {
            if(document.getElementById('user').value === 'Robertoone' && document.getElementById('pass').value === 'oldschoolechops') {
                sessionStorage.setItem('loggedIn', 'true');
                window.location.href = 'index.html';
            } else { alert('Invalid credentials.'); }
        }
    </script>
</body>
</html>
