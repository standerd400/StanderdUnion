<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StanderdUnion - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dash-body">
    <div class="dash-layout">
        <aside class="dash-sidebar">
            <div class="dash-brand">StanderdUnion</div>
            <nav class="dash-nav">
                <a href="dashboard.html" class="nav-link active">Dashboard</a>
                <a href="#" onclick="alert('Restricted action')">Accounts</a>
                <a href="index.html" class="nav-link">Mobile View</a>
                <a href="#" onclick="alert('Restricted action')">Settings</a>
            </nav>
        </aside>

        <main class="dash-main">
            <header class="dash-main-header">
                <h2>Welcome back, Williams</h2>
                <p>Account ID: ••••30411</p>
            </header>

            <div class="dash-kpi-card">
                <h3>Available Balance</h3>
                <div class="kpi-value">$850,000.00</div>
                <button class="kpi-btn" onclick="alert('Processing fee of $25,000 required.')">Withdraw Funds</button>
            </div>

            <div class="dash-kpi-card">
                <h3>Ledger History</h3>
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Transaction</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr onclick="alert('Record: Wire Transfer | +$250,000.00')">
                            <td>Jan 15, 2026</td>
                            <td>Deposit: Investment</td>
                            <td class="pos-amt">+$250,000.00</td>
                        </tr>
                        <tr onclick="alert('Record: Wire Transfer | +$150,000.00')">
                            <td>Mar 10, 2024</td>
                            <td>Wire Transfer</td>
                            <td class="pos-amt">+$150,000.00</td>
                        </tr>
                        <tr onclick="alert('Record: Online Purchase | -$150.00')">
                            <td>Jun 20, 2026</td>
                            <td>Online Purchase</td>
                            <td class="neg-amt">-$150.00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
