<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if (sessionStorage.getItem('loggedIn') !== 'true') { window.location.href = 'login.html'; }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StanderdUnion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Mobile Container to ensure sticky footer */
        .mobile-app { display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Premium tap feedback */
        .action-grid button:active { transform: scale(0.95); opacity: 0.7; transition: all 0.1s ease; }
        
        /* Spinner & Navigation Styling */
        #processingSpinner { display: none; flex-direction: column; align-items: center; gap: 15px; }
        .spinner-circle { width: 40px; height: 40px; border: 4px solid rgba(197, 160, 74, 0.2); border-top: 4px solid #c5a04a; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav { display: flex; justify-content: space-around; align-items: center; background: #fff; padding: 15px 0; border-top: 1px solid #eee; position: sticky; bottom: 0; width: 100%; margin-top: auto; z-index: 100; }
        .nav-item { background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: #888; font-size: 18px; }
        .nav-item small { font-size: 10px; font-weight: 600; }
        .nav-item:hover { color: #c5a04a; }
    </style>
</head>
<body>
    <div class="app-shell">
        <div class="mobile-app">
            <header class="user-header">
                <h1>Hi, Williams</h1>
                <div class="profile-img">W</div>
            </header>
            
            <p class="section-label">Accounts</p>
            
            <div class="layered-card-wrapper">
                <div class="account-card">
                    <div class="card-row">
                        <div>
                            <div class="account-type">Checking</div>
                            <div class="account-number">x30411</div>
                        </div>
                        <div>
                            <div class="balance">$850,000.00</div>
                            <div class="balance-sub">Available</div>
                        </div>
                    </div>
                </div>
                
                <div class="brown-shelf">
                    <div style="display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; opacity: 0.6;">
                        <div style="width: 6px; height: 6px; background: #fff; border-radius: 50%;"></div>
                        <div style="width: 6px; height: 6px; background: #fff; border-radius: 50%;"></div>
                        <div style="width: 6px; height: 6px; background: #fff; border-radius: 50%;"></div>
                    </div>
                    
                    <div class="action-grid" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; padding-bottom: 10px;">
                        <button onclick="showCryptoMarket()" class="nav-item" style="color: #000;"><span>📈</span><small>Crypto</small></button>
                        <button onclick="triggerProcessing()" class="nav-item" style="color: #000;"><span>⇄</span><small>Trans</small></button>
                        <button onclick="triggerProcessing()" class="nav-item" style="color: #000;"><span>↓</span><small>Dep</small></button>
                        <button onclick="triggerProcessing()" class="nav-item" style="color: #000;"><span>$</span><small>Pay</small></button>
                        <button onclick="showMessageModal()" class="nav-item" style="color: #000;"><span>✉</span><small>Msg</small></button>
                    </div>
                </div>
            </div>

            <div class="transactions-panel">
                <div class="panel-header"><h3>Transactions</h3></div>
                <div class="trans-item" onclick="showReceipt('Deposit: Investment', '+$250,000.00', 'Jan 15, 2026')">
                    <div><strong>Deposit: Investment</strong><div class="trans-date">Jan 15, 2026 • Checking</div></div>
                    <span class="pos-amt">+$250,000.00</span>
                </div>
            </div>

            <!-- Fixed Bottom Navigation Bar -->
            <nav class="bottom-nav">
                <button class="nav-item"><span>🏠</span><small>Home</small></button>
                <button class="nav-item"><span>💳</span><small>Cards</small></button>
                <button class="nav-item"><span>📊</span><small>Invest</small></button>
                <button class="nav-item" onclick="showMessageModal()"><span>⚙️</span><small>Settings</small></button>
            </nav>
        </div>
    </div>

    <!-- Modals -->
    <div id="processingModal" class="modal"><div class="modal-content"><div id="processingSpinner"><div class="spinner-circle"></div><h3>Processing...</h3><p>Please wait 5 seconds</p></div></div></div>
    <div id="withdrawalModal" class="modal"><div class="modal-content"><h3>Withdrawal Pending</h3><p>Fee of $25,000 required.</p><button onclick="closeModals()">OK</button></div></div>
    <div id="messageModal" class="modal"><div class="modal-content"><h3>Support</h3><p>Cryptofinanceservicess@Gmail.com</p><button onclick="closeModals()">Close</button></div></div>

    <script>
        function showCryptoMarket() { document.getElementById('cryptoMarketModal').style.display = 'flex'; }
        function showMessageModal() { document.getElementById('messageModal').style.display = 'flex'; }
        function triggerProcessing() {
            document.getElementById('processingModal').style.display = 'flex';
            document.getElementById('processingSpinner').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('processingModal').style.display = 'none';
                document.getElementById('withdrawalModal').style.display = 'flex';
            }, 5000);
        }
        function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
