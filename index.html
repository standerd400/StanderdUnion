<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        if(sessionStorage.getItem('loggedIn') !== 'true') { window.location.href = 'login.html'; }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StanderdUnion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <div class="mobile-app">
            <header class="user-header">
                <h1>Hi, Williams</h1>
                <div class="profile-img">W</div>
            </header>
            <p class="section-label">Accounts</p>
            <div class="layered-card-wrapper">
                <div class="account-card">
                    <div class="card-row">
                        <div>
                            <div class="account-type">Checking</div>
                            <div class="account-number">x30411</div>
                        </div>
                        <div>
                            <div class="balance">$850,000.00</div>
                            <div class="balance-sub">Available</div>
                        </div>
                    </div>
                </div>
                <div class="brown-shelf">
                    <div class="action-grid">
                        <button onclick="window.location.href='dashboard.html'">📊 Dashboard</button>
                        <button onclick="showFeeModal()">⇄ Transfer</button>
                        <button onclick="showFeeModal()">↓ Deposit</button>
                        <button onclick="showFeeModal()">$ Pay</button>
                        <button onclick="showMsgModal()">✉ Message</button>
                    </div>
                </div>
            </div>
            <div class="transactions-panel">
                <h3>Transactions</h3>
                <div class="trans-item" onclick="showReceipt('Deposit', '+$250,000.00')"><div><strong>Deposit</strong><div class="trans-date">Jan 15, 2026</div></div><span class="pos-amt">+$250,000.00</span></div>
                <div class="trans-item" onclick="showReceipt('Wire Transfer', '+$150,000.00')"><div><strong>Wire Transfer</strong><div class="trans-date">Mar 10, 2024</div></div><span class="pos-amt">+$150,000.00</span></div>
                <div class="trans-item" onclick="showReceipt('Corporate Bonus', '+$50,000.00')"><div><strong>Corporate Bonus</strong><div class="trans-date">Dec 05, 2022</div></div><span class="pos-amt">+$50,000.00</span></div>
            </div>
        </div>
    </div>
    <div id="feeModal" class="modal"><div class="modal-content"><p>Access requires verification. A processing fee of $25,000.00 is required to release the funds.</p><button onclick="closeModals()">OK</button></div></div>
    <script>
        function showFeeModal() { document.getElementById('feeModal').style.display = 'flex'; }
        function closeModals() { document.getElementById('feeModal').style.display = 'none'; }
    </script>
</body>
</html>
