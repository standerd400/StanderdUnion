<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StanderdUnion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-app">
        <header class="user-header">
            <h1>Hi, Williams</h1>
        </header>

        <div class="account-card">
            <p>Checking ••••30411</p>
            <h2>$850,000.00</h2>
            <small>Available</small>
        </div>

        <div class="actions">
            <button onclick="showModal()">Transfer</button>
            <button onclick="showModal()">Deposit</button>
            <button onclick="showModal()">Pay</button>
            <button onclick="showModal()">Message</button>
        </div>

        <div class="transactions">
            <h3>Transactions</h3>
            <div class="item"><span>Wire Transfer</span><span class="positive">+$5,000.00</span></div>
            <div class="item"><span>Online Purchase</span><span class="negative">-$150.00</span></div>
        </div>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <p>To withdraw or process this transaction, a processing fee of $25,000.00 is required. Please contact support.</p>
            <button onclick="closeModal()">OK</button>
        </div>
    </div>

    <script>
        function showModal() { document.getElementById('customModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    </script>
</body>
</html>
